name: CLI Smoke Tests

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  cli-smoke:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Janet
        run: brew install janet

      - name: Run CLI smoke tests
        run: tests/cli-smoke.sh
